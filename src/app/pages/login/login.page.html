<section class="page">
  <header class="header">
    <h1>Welcome to QuickFox</h1>
    <a routerLink="/register">Register</a>
  </header>

  <form [formGroup]="form" (ngSubmit)="login()" class="form">
    <label>
      Email
      <input type="email" formControlName="email" [class.input-error]="hasError('email')" />
      @if (hasError('email')) {
        <span class="error-message">{{ getErrorMessage('email') }}</span>
      }
    </label>

    <label>
      Password
      <input type="password" formControlName="password" [class.input-error]="hasError('password')" />
      @if (hasError('password')) {
        <span class="error-message">{{ getErrorMessage('password') }}</span>
      }
    </label>

    <button type="submit" class="primary-btn">Sign In</button>
  </form>

  <div class="guest-login">
    <button type="button" (click)="loginAsGuest()" class="guest-btn">
      Continue as Guest
    </button>
  </div>
</section>
