<section class="page">
  <app-page-header title="Latest Contacts" (sortToggled)="toggleSort()" (favoritesViewToggled)="toggleFavoritesView()">
    <div header-actions>
      <button class="btn sort-btn">
        Sort {{ getSortIndicator() }}
      </button>
      <a class="btn" routerLink="/contacts/new">Add Contact</a>
      <button class="tab-btn" [class.active]="showFavoritesOnly()">
        {{ showFavoritesOnly() ? 'Show All' : 'Show Favorites' }}
      </button>
    </div>
  </app-page-header>
  
  <app-search-container (inputChanged)="setSearchTerm($event)" />

   @if (filteredContacts().length === 0) {
    <p class="empty">No contacts found matching your search.</p>
   } @else {
    <ul class="list">
      @for (contact of sortedContacts(); track contact.id) {
        <li class="contact-item">
          <app-contact-item [contact]="contact" (favoriteToggled)="toggleFavorite($event)" />
        </li>
      }
    </ul>
   }
</section>
