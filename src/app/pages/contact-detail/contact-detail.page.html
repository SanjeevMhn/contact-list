<section class="page">
  <header class="header">
    <h1>Contact Detail</h1>
    <a routerLink="/contacts">Back to list</a>
  </header>

  @if (!contact()) {
    <p>Contact not found.</p>
  } @else {
    @if (!isEditing()) {
      <div class="detail">
        <p><strong>Name:</strong> {{ contact()!.name }}</p>
        <p><strong>Mobile:</strong> {{ contact()!.mobile }}</p>
        <p><strong>Email:</strong> {{ contact()!.email }}</p>
        <p><strong>Other ID:</strong> {{ contact()!.otherId }}</p>
      </div>

      <div class="actions">
        <button type="button" class="edit" (click)="startEdit()">Edit</button>
        <button type="button" class="delete" (click)="deleteContact()">Delete</button>
      </div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="save()" class="form">
        <label>
          Name
          <input type="text" formControlName="name" [class.input-error]="hasError('name')" />
          @if (hasError('name')) {
            <span class="error-message">{{ getErrorMessage('name') }}</span>
          }
        </label>

        <label>
          Mobile
          <input type="text" formControlName="mobile" [class.input-error]="hasError('mobile')" />
          @if (hasError('mobile')) {
            <span class="error-message">{{ getErrorMessage('mobile') }}</span>
          }
        </label>

        <label>
          Email
          <input type="email" formControlName="email" [class.input-error]="hasError('email')" />
          @if (hasError('email')) {
            <span class="error-message">{{ getErrorMessage('email') }}</span>
          }
        </label>

        <label>
          Other ID
          <input type="text" formControlName="otherId" [class.input-error]="hasError('otherId')" />
          @if (hasError('otherId')) {
            <span class="error-message">{{ getErrorMessage('otherId') }}</span>
          }
        </label>

        <div class="actions">
          <button type="submit" class="edit">Save</button>
          <button type="button" class="cancel" (click)="cancelEdit()">Cancel</button>
        </div>
      </form>
    }
  }
</section>
